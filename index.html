<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Leaderboard Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-pink: #be579b;
            --f1-blue: #0e4596;
            --f1-dark: #050505;
        }

        body {
            background-color: var(--f1-dark);
            background-image: 
                radial-gradient(circle at top right, rgba(14, 69, 150, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(190, 87, 155, 0.1), transparent 40%);
            color: white;
            font-family: 'Orbitron', sans-serif; /* Todo con fuente F1 */
            overflow-x: hidden;
        }

        /* Contenedor principal con scroll suave */
        #leaderboard {
            transition: all 0.5s ease-in-out;
        }

        /* Tarjetas de Escudería */
        .card-escuderia {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--f1-blue);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Estilos del Podio */
        .top-1 { 
            border-left: 8px solid var(--f1-pink); 
            background: linear-gradient(90deg, rgba(190, 87, 155, 0.2) 0%, rgba(5,5,5,1) 100%);
            transform: scale(1.05);
            z-index: 10;
        }
        .top-2 { border-left-color: #e2e8f0; }
        .top-3 { border-left-color: #92400e; }

        /* Animación de entrada de las filas */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-row { animation: slideIn 0.5s ease forwards; }

        /* Escudería SVG Animada */
        .escuderia-svg {
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo-header {
            max-width: 280px;
            margin: 0 auto;
            filter: drop-shadow(0 0 15px rgba(14, 69, 150, 0.5));
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="text-center mb-12">
        <img src="assets/NF1GO.svg" alt="NF1GO Logo" class="logo-header mb-4">
        <div class="h-1 w-24 bg-[#be579b] mx-auto rounded-full"></div>
    </header>

    <main id="leaderboard" class="max-w-3xl mx-auto space-y-4">
        </main>

    <script>
        // Tu URL de Google Sheets en formato CSV
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh1R3viWQTZFYJa0pbYUVdT0eZfPcdXexgFXBWsEHOC-GtJSf3U6k5bF-n1WBkx7afG14cswrGsWb-/pub?output=csv';

        async function updateLeaderboard() {
            try {
                // El timestamp al final evita que el navegador use una versión vieja (cache)
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const data = await response.text();
                
                const rows = data.split('\n').slice(1); 
                const teams = rows.map(row => {
                    const columns = row.split(',');
                    return {
                        name: columns[0]?.trim(),
                        score: parseInt(columns[1]) || 0,
                        svgId: columns[2]?.trim() || "E01"
                    };
                }).filter(t => t.name);

                // Ordenamos por puntaje
                teams.sort((a, b) => b.score - a.score);

                render(teams);
            } catch (error) {
                console.error("Error en la telemetría:", error);
            }
        }

        function render(teams) {
            const container = document.getElementById('leaderboard');
            
            // Generamos el HTML
            container.innerHTML = teams.map((team, index) => {
                const isTop3 = index < 3;
                const podiumClass = isTop3 ? `top-${index + 1}` : '';
                const rankColor = index === 0 ? 'text-[#be579b]' : index === 1 ? 'text-zinc-300' : index === 2 ? 'text-[#92400e]' : 'text-zinc-600';

                return `
                    <div class="card-escuderia ${podiumClass} flex items-center justify-between p-5 rounded-r-2xl animate-row" style="animation-delay: ${index * 0.1}s">
                        <div class="flex items-center gap-6">
                            <span class="font-black italic text-3xl w-12 ${rankColor}">
                                ${index + 1}
                            </span>
                            
                            <div class="relative w-20 h-20">
                                <img src="assets/${team.svgId}.svg" 
                                     class="escuderia-svg w-full h-full object-contain"
                                     onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${index}'">
                            </div>

                            <h2 class="font-black text-2xl md:text-3xl uppercase tracking-tighter leading-none italic">
                                ${team.name}
                            </h2>
                        </div>

                        <div class="text-right">
                            <div class="text-4xl font-black leading-none" style="color: ${index === 0 ? 'var(--f1-pink)' : 'white'}">
                                ${team.score}
                            </div>
                            <div class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase">Puntos</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- MOTOR DE ACTUALIZACIÓN AUTOMÁTICA ---
        // 1. Carga inicial
        updateLeaderboard();

        // 2. Revisar cambios cada 30 segundos sin recargar la página (F5)
        setInterval(updateLeaderboard, 30000);
    </script>
</body>
</html>
