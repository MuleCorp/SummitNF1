<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF1GO | Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --f1-pink: #be579b;
            --f1-blue: #0e4596;
            --f1-dark: #050505;
        }

        html { scroll-behavior: smooth; }
        body { background-color: var(--f1-dark); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }

        /* SECCIÓN 1: LEADERBOARD */
        #leaderboard-section {
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.95)), url('assets/fondoboard.jpeg');
            background-size: cover; background-attachment: fixed; background-position: center;
            padding-bottom: 80px;
        }

        .card-escuderia {
            background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-left: 6px solid var(--f1-blue);
        }
        .top-1 { border-left-color: var(--f1-pink); background: rgba(190, 87, 155, 0.15); }

        /* SECCIÓN 2: PREMIACIÓN */
        #awards-section {
            background-image: linear-gradient(rgba(5, 5, 5, 0.65), rgba(5, 5, 5, 0.65)), url('assets/podio_estatuillas.png');
            background-size: cover; background-position: center bottom; background-repeat: no-repeat;
            height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: flex-end;
            position: relative;
            /* ESPACIO SUPERIOR PARA EL SVG */
            padding-top: 100px;
        }

        /* DISEÑO DE CONTENEDORES */
        .cylinder-podium {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-align: center;
        }

        .cylinder-base {
            width: 100%;
            border-radius: 50% / 15%; 
            position: relative;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .base-gold { background: linear-gradient(135deg, #712d5a 0%, var(--f1-pink) 50%, #4a1d3b 100%); border-top: 3px solid #fbcfe8; }
        .base-silver { background: linear-gradient(135deg, #1e293b 0%, #94a3b8 50%, #0f172a 100%); border-top: 3px solid #e2e8f0; }
        .base-bronze { background: linear-gradient(135deg, #451a03 0%, #b45309 50%, #27170a 100%); border-top: 3px solid #fbbf24; }

        .podium-svg { 
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); 
            animation: float 4s ease-in-out infinite;
            z-index: 10;
        }

        .statuette-img {
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.9));
            z-index: 5;
            position: relative;
            /* REDUCIMOS ESPACIO CON EL SVG */
            margin-top: -10px;
        }

        .podium-name {
            width: 100%;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 15px #000;
            padding: 0 10px;
            z-index: 20;
            color: white !important; /* TODOS EN BLANCO */
            white-space: nowrap;
            /* AUMENTAMOS ESPACIO CON LA ESTATUILLA Y REDUCIMOS CON EL CILINDRO */
            margin-top: 25px; 
            margin-bottom: -15px; 
        }

        .btn-go { background: var(--f1-pink); padding: 14px 28px; border-radius: 4px; box-shadow: 0 0 20px rgba(190, 87, 155, 0.4); transition: 0.3s; }
        .btn-go:hover { transform: scale(1.05); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate-row { animation: slideUp 0.7s ease forwards; }
    </style>
</head>
<body>

    <section id="leaderboard-section" class="min-h-screen py-12 px-4">
        <header class="text-center mb-12">
            <img src="assets/NF1GO.svg" alt="Logo" class="max-w-[260px] mx-auto" onerror="this.style.display='none'">
            <div class="h-1 w-24 bg-[#be579b] mx-auto mt-4 rounded-full"></div>
        </header>

        <div id="leaderboard-container" class="max-w-3xl mx-auto space-y-4 mb-20 text-center text-zinc-600 animate-pulse uppercase italic font-bold">
            Sincronizando telemetría...
        </div>

        <div class="text-center">
            <a href="#awards-section" class="btn-go font-black italic uppercase text-sm tracking-widest text-white">Ir a Premiación ↓</a>
        </div>
    </section>

    <section id="awards-section">
        <div id="podium-display" class="w-full max-w-6xl mx-auto flex items-end justify-center gap-4 md:gap-10 pb-24 px-4">
            </div>

        <div class="w-full text-center pb-8">
            <h2 class="font-black italic text-xl md:text-2xl tracking-[0.6em] text-white/80 uppercase" style="text-shadow: 0 0 10px #000;">Parrilla de Ganadores</h2>
        </div>
    </section>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwwraDukAcjF87JOC550ef9BPkvodXFl3Nufj_SyzY7accOW78XB-fuo8ResMAHpnTF/exec';

        async function update() {
            try {
                const response = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
                const data = await response.json();
                const teams = data.map(t => {
                    const v = Object.values(t);
                    return { name: v[0], score: parseInt(v[1]) || 0, svg: v[2] || "E01" };
                }).sort((a, b) => b.score - a.score);

                renderList(teams);
                renderAwards(teams);
            } catch (e) { console.error(e); }
        }

        function renderList(teams) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = teams.map((team, i) => `

                    <div class="flex items-center gap-6 text-left">
                        <span class="text-3xl font-black italic ${i === 0 ? 'text-[#be579b]' : 'text-zinc-700'} w-12 text-center">${i+1}</span>

                        <h2 class="text-2xl md:text-3xl font-black uppercase italic tracking-tighter">${team.name}</h2>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-black ${i === 0 ? 'text-[#be579b]' : 'text-white'}">${team.score}</div>
