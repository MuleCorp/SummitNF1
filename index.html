<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF1GO | Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --f1-pink: #be579b;
            --f1-blue: #0e4596;
            --f1-dark: #050505;
        }

        html { scroll-behavior: smooth; }
        body { background-color: var(--f1-dark); color: white; font-family: 'Orbitron', sans-serif; margin: 0; }

        /* --- CAPAS DE FONDO FIJAS --- */
        .bg-fixed-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease;
        }
        .bg-leaderboard { background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.95)), url('assets/fondoboard.jpeg'); }
        .bg-podium { background-image: linear-gradient(rgba(5, 5, 5, 0.6), rgba(5, 5, 5, 0.6)), url('assets/podio_estatuillas.png'); opacity: 0; }

        /* --- EFECTO DE RESPIRO EN TIPOGRAFÍA --- */
        @keyframes breatheText {
            0%, 100% { opacity: 1; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { opacity: 0.7; text-shadow: 0 0 2px rgba(255,255,255,0); }
        }

        .breathing-text {
            animation: breatheText 3s ease-in-out infinite;
        }

        /* --- ANIMACIONES DE ENTRADA --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-row {
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .card-escuderia {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 6px solid var(--f1-blue);
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .card-escuderia:hover { transform: translateX(8px); background: rgba(30, 30, 30, 0.8); }
        .top-1 { border-left-color: var(--f1-pink); background: rgba(190, 87, 155, 0.1); }

        /* --- ESTILOS DEL PODIO --- */
        .cylinder-podium { width: 100%; max-width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .cylinder-base {
            width: 100%; border-radius: 50% / 15%; position: relative;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
        }
        .base-gold { background: linear-gradient(135deg, #712d5a 0%, var(--f1-pink) 50%, #4a1d3b 100%); border-top: 3px solid #fbcfe8; }
        .base-silver { background: linear-gradient(135deg, #1e293b 0%, #94a3b8 50%, #0f172a 100%); border-top: 3px solid #e2e8f0; }
        .base-bronze { background: linear-gradient(135deg, #451a03 0%, #b45309 50%, #27170a 100%); border-top: 3px solid #fbbf24; }

        .podium-name { font-weight: 900; text-transform: uppercase; text-shadow: 2px 2px 10px #000; color: white !important; text-align: center; white-space: nowrap; }
        .statuette-img { height: auto; filter: drop-shadow(0 0 15px rgba(0,0,0,1)); margin-bottom: -40px; z-index: 5; }
        .podium-svg { filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); animation: float 4s ease-in-out infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    </style>
</head>
<body>

    <div id="bg-1" class="bg-fixed-layer bg-leaderboard"></div>
    <div id="bg-2" class="bg-fixed-layer bg-podium"></div>

    <section id="leaderboard-section" class="py-12 px-4 relative z-10">
        <header class="text-center mb-12">
            <img src="assets/NF1GO.svg" alt="Logo" class="max-w-[260px] mx-auto">
            <div class="h-1 w-24 bg-[#be579b] mx-auto mt-4 rounded-full"></div>
        </header>
        <div id="leaderboard-container" class="max-w-3xl mx-auto space-y-4 mb-20 text-center text-zinc-600 italic font-bold">
            Sincronizando telemetría...
        </div>
        <div class="text-center pb-12">
            <a href="#awards-section" class="bg-[#be579b] px-8 py-4 rounded font-black uppercase text-sm tracking-widest inline-block shadow-lg">Ir a Premiación ↓</a>
        </div>
    </section>

    <section id="awards-section" class="h-screen flex flex-col justify-end relative z-10 pb-16">
        <div id="podium-display" class="w-full max-w-6xl mx-auto flex items-end justify-center gap-4 md:gap-12 px-4 mb-10"></div>
        <h2 class="text-center font-black italic text-xl md:text-2xl tracking-[0.6em] text-white/80 uppercase">Parrilla de Ganadores</h2>
    </section>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwwraDukAcjF87JOC550ef9BPkvodXFl3Nufj_SyzY7accOW78XB-fuo8ResMAHpnTF/exec';
        
        // Variable para guardar el estado anterior de los datos
        let lastDataString = "";

        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const winHeight = window.innerHeight;
            document.getElementById('bg-1').style.opacity = scrollPos > winHeight * 0.4 ? '0' : '1';
            document.getElementById('bg-2').style.opacity = scrollPos > winHeight * 0.4 ? '1' : '0';
        });

        async function update() {
            try {
                const response = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
                const data = await response.json();
                
                // Creamos una "huella digital" de los datos recibidos
                const currentDataString = JSON.stringify(data);

                // --- SMART REFRESH ---
                // Solo ejecutamos el render si los datos son diferentes a los anteriores
                if (currentDataString !== lastDataString) {
                    console.log("¡Datos nuevos detectados! Actualizando boxes...");
                    lastDataString = currentDataString;

                    const teams = data.map(t => {
                        const v = Object.values(t);
                        return { name: v[0], score: parseInt(v[1]) || 0, svg: v[2] || "E01" };
                    }).sort((a, b) => b.score - a.score);

                    renderList(teams);
                    renderAwards(teams);
                } else {
                    console.log("Telemetría sin cambios. Manteniendo visuales.");
                }
            } catch (e) { console.error(e); }
        }

        function renderList(teams) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = teams.map((team, i) => `
                <div class="card-escuderia ${i === 0 ? 'top-1' : ''} flex items-center justify-between p-5 rounded-r-2xl animate-row" 
                     style="animation-delay: ${i * 0.07}s">
                    <div class="flex items-center gap-6">
                        <span class="text-3xl font-black italic ${i === 0 ? 'text-[#be579b]' : 'text-zinc-700'} w-12 text-center">${i+1}</span>
                        <img src="assets/${team.svg}.svg" class="w-16 h-16 object-contain" onerror="this.src='assets/E01.svg'">
                        <h2 class="text-xl md:text-3xl font-black uppercase italic tracking-tighter leading-none breathing-text">${team.name}</h2>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-black ${i === 0 ? 'text-[#be579b]' : 'text-white'}">${team.score}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderAwards(teams) {
            const container = document.getElementById('podium-display');
            const p = [teams[0] || {name:'', svg:'E01'}, teams[1] || {name:'', svg:'E01'}, teams[2] || {name:'', svg:'E01'}];

            container.innerHTML = `
                <div class="cylinder-podium">
                    <img src="assets/${p[1].svg}.svg" class="podium-svg w-28 h-28">
                    <img src="assets/plata.png" class="statuette-img w-[170px]">
                    <div class="cylinder-base base-silver h-28 md:h-36"><div class="podium-name text-lg md:text-xl font-bold breathing-text">${p[1].name}</div></div>
                </div>
                <div class="cylinder-podium">
                    <img src="assets/${p[0].svg}.svg" class="podium-svg w-36 h-36">
                    <img src="assets/oro.png" class="statuette-img w-[210px]">
                    <div class="cylinder-base base-gold h-40 md:h-56"><div class="podium-name text-xl md:text-3xl font-black tracking-tighter breathing-text">${p[0].name}</div></div>
                </div>
                <div class="cylinder-podium">
                    <img src="assets/${p[2].svg}.svg" class="podium-svg w-24 h-24">
                    <img src="assets/bronce.png" class="statuette-img w-[150px]">
                    <div class="cylinder-base base-bronze h-20 md:h-28"><div class="podium-name text-base md:text-lg font-bold breathing-text">${p[2].name}</div></div>
                </div>
            `;
        }

        update();
        setInterval(update, 10000); // Revisa Google cada 10 segundos
    </script>
</body>
</html>
