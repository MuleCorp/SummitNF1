<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF1GO | Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --f1-pink: #be579b;
            --f1-blue: #0e4596;
            --f1-dark: #050505;
        }

        html { scroll-behavior: smooth; }
        body { background-color: var(--f1-dark); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }

        /* SECCIÓN 1: LEADERBOARD */
        #leaderboard-section {
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.95)), url('assets/fondoboard.jpeg');
            background-size: cover; background-attachment: fixed; background-position: center;
            padding-bottom: 100px; /* Espacio para que no se pegue al podio */
        }

        .card-escuderia {
            background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-left: 6px solid var(--f1-blue);
        }
        .top-1 { border-left-color: var(--f1-pink); background: rgba(190, 87, 155, 0.15); }

        /* SECCIÓN 2: PREMIACIÓN */
        #awards-section {
            background-image: linear-gradient(rgba(5, 5, 5, 0.6), rgba(5, 5, 5, 0.6)), url('assets/podio_estatuillas.png');
            background-size: cover; background-position: center bottom; background-repeat: no-repeat;
            height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: flex-end;
            position: relative; 
        }

        /* DISEÑO DE CILINDROS */
        .cylinder-podium {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-align: center;
        }

        .cylinder-base {
            width: 100%;
            border-radius: 50% / 15%; /* Hace que parezca un cilindro */
            position: relative;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        .base-gold { background: linear-gradient(135deg, #712d5a 0%, var(--f1-pink) 50%, #4a1d3b 100%); border-top: 2px solid #fbcfe8; }
        .base-silver { background: linear-gradient(135deg, #1e293b 0%, #94a3b8 50%, #0f172a 100%); border-top: 2px solid #e2e8f0; }
        .base-bronze { background: linear-gradient(135deg, #451a03 0%, #b45309 50%, #27170a 100%); border-top: 2px solid #fbbf24; }

        .podium-svg { filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); animation: float 4s ease-in-out infinite; }
        
        .statuette-img {
            width: 160px; /* Muy grandes como pediste */
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8));
            margin-top: -40px; /* Para que pise un poco el nombre */
        }

        .podium-name {
            width: 100%;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            italic;
            text-shadow: 2px 2px 10px #000;
            padding: 0 10px;
            z-index: 20;
        }

        .btn-go { background: var(--f1-pink); padding: 14px 28px; border-radius: 4px; box-shadow: 0 0 20px rgba(190, 87, 155, 0.4); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-row { animation: slideUp 0.6s ease forwards; }
    </style>
</head>
<body>

    <section id="leaderboard-section" class="min-h-screen py-12 px-4">
        <header class="text-center mb-12">
            <img src="assets/NF1GO.svg" alt="Logo" class="max-w-[260px] mx-auto">
            <div class="h-1 w-24 bg-[#be579b] mx-auto mt-4 rounded-full"></div>
        </header>

        <div id="leaderboard-container" class="max-w-3xl mx-auto space-y-4 mb-20 text-center text-zinc-600 animate-pulse uppercase italic font-bold">
            Sincronizando telemetría...
        </div>

        <div class="text-center">
            <a href="#awards-section" class="btn-go font-black italic uppercase text-sm tracking-widest text-white">Ir a Premiación ↓</a>
        </div>
    </section>

    <section id="awards-section">
        <div id="podium-display" class="w-full max-w-6xl mx-auto flex items-end justify-center gap-4 md:gap-8 pb-16 px-4">
            </div>

        <div class="w-full text-center pb-8">
            <h2 class="font-black italic text-xl md:text-2xl tracking-[0.6em] text-white/80 uppercase">Parrilla de Ganadores</h2>
        </div>
    </section>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwwraDukAcjF87JOC550ef9BPkvodXFl3Nufj_SyzY7accOW78XB-fuo8ResMAHpnTF/exec';

        async function update() {
            try {
                const response = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
                const data = await response.json();
                const teams = data.map(t => {
                    const v = Object.values(t);
                    return { name: v[0], score: parseInt(v[1]) || 0, svg: v[2] || "E01" };
                }).sort((a, b) => b.score - a.score);

                renderList(teams);
                renderAwards(teams);
            } catch (e) { console.error(e); }
        }

        function renderList(teams) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = teams.map((team, i) => `
                <div class="card-escuderia ${i === 0 ? 'top-1' : ''} flex items-center justify-between p-5 rounded-r-2xl animate-row" style="animation-delay: ${i*0.05}s">
                    <div class="flex items-center gap-6 text-left">
                        <span class="text-3xl font-black italic ${i === 0 ? 'text-[#be579b]' : 'text-zinc-700'} w-12">${i+1}</span>
                        <img src="assets/${team.svg}.svg" class="w-16 h-16 object-contain" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${i}'">
                        <h2 class="text-2xl md:text-3xl font-black uppercase italic tracking-tighter">${team.name}</h2>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-black ${i === 0 ? 'text-[#be579b]' : 'text-white'}">${team.score}</div>
                        <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Puntos</div>
                    </div>
                </div>
            `).join('');
        }

        function renderAwards(teams) {
            const container = document.getElementById('podium-display');
            const p = [teams[0] || {name:''}, teams[1] || {name:''}, teams[2] || {name:''}];

            // Estructura: PLATA (Izq) - ORO (Centro) - BRONCE (Der)
            container.innerHTML = `
                <div class="cylinder-podium animate-row" style="animation-delay: 0.1s">
                    <img src="assets/${p[1].svg}.svg" class="podium-svg w-28 h-28 mb-4">
                    <div class="podium-name text-white text-xl md:text-2xl mb-2">${p[1].name}</div>
                    <div class="cylinder-base base-silver h-32 md:h-40">
                         <img src="assets/plata.png" class="statuette-img">
                    </div>
                </div>

                <div class="cylinder-podium animate-row">
                    <img src="assets/${p[0].svg}.svg" class="podium-svg w-36 h-36 mb-6">
                    <div class="podium-name text-[#be579b] text-3xl md:text-4xl mb-4">${p[0].name}</div>
                    <div class="cylinder-base base-gold h-48 md:h-60">
                         <img src="assets/oro.png" class="statuette-img w-[200px]">
                    </div>
                </div>

                <div class="cylinder-podium animate-row" style="animation-delay: 0.2s">
                    <img src="assets/${p[2].svg}.svg" class="podium-svg w-24 h-24 mb-4">
                    <div class="podium-name text-orange-200 text-lg md:text-xl mb-2">${p[2].name}</div>
                    <div class="cylinder-base base-bronze h-24 md:h-32">
                         <img src="assets/bronce.png" class="statuette-img">
                    </div>
                </div>
            `;
        }

        update();
        setInterval(update, 10000);
    </script>
</body>
</html>
