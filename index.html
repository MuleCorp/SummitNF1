<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Leaderboard | Escuderías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-pink: #be579b;
            --f1-blue: #0e4596;
            --f1-dark: #050505;
        }

        body {
            background-color: var(--f1-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(190, 87, 155, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(14, 69, 150, 0.08) 0%, transparent 40%);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .font-f1 { font-family: 'Orbitron', sans-serif; }

        /* Estilo base de las tarjetas */
        .card-escuderia {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* PODIO: Los primeros 3 */
        .top-1 { 
            border-left: 6px solid var(--f1-pink); 
            background: linear-gradient(90deg, rgba(190, 87, 155, 0.15), transparent);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(190, 87, 155, 0.2);
        }
        .top-2 { border-left: 6px solid var(--f1-blue); }
        .top-3 { border-left: 6px solid #94a3b8; }

        /* Animación para el SVG (la cabeza animada) */
        .escuderia-svg {
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            animation: bounce 4s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        /* Línea de decoración */
        .f1-divider {
            height: 4px;
            background: linear-gradient(90deg, var(--f1-pink) 0%, var(--f1-blue) 100%);
            width: 100px;
            margin: 10px auto;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <header class="text-center mb-12">
        <h1 class="font-f1 text-4xl md:text-5xl font-black italic tracking-tighter">
            <span style="color: var(--f1-blue)">F1</span> <span style="color: var(--f1-pink)">CHALLENGE</span>
        </h1>
        <div class="f1-divider"></div>
        <p class="text-zinc-500 uppercase text-xs tracking-[0.3em] font-f1">Constructor Standings 2026</p>
    </header>

    <div id="leaderboard" class="max-w-2xl mx-auto space-y-3">
        <div class="text-center text-zinc-700 animate-pulse font-f1">CALENTANDO MOTORES...</div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh1R3viWQTZFYJa0pbYUVdT0eZfPcdXexgFXBWsEHOC-GtJSf3U6k5bF-n1WBkx7afG14cswrGsWb-/pub?output=csv';

        async function updateLeaderboard() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                
                // Parsear CSV (Nombre en A, Puntos en B, ID SVG en C)
                const rows = data.split('\n').slice(1); 
                const teams = rows.map(row => {
                    const columns = row.split(',');
                    return {
                        name: columns[0]?.trim(),
                        score: parseInt(columns[1]) || 0,
                        svgId: columns[2]?.trim() || "E01" // Por defecto E01 si está vacío
                    };
                }).filter(t => t.name); // Eliminar filas vacías

                // Ordenar por puntaje de mayor a menor
                teams.sort((a, b) => b.score - a.score);

                render(teams);
            } catch (error) {
                console.error("Error en boxes:", error);
            }
        }

        function render(teams) {
            const container = document.getElementById('leaderboard');
            container.innerHTML = teams.map((team, index) => {
                const isTop3 = index < 3;
                const podiumClass = isTop3 ? `top-${index + 1}` : '';
                const rankColor = index === 0 ? 'text-[#be579b]' : index === 1 ? 'text-[#0e4596]' : 'text-zinc-400';

                return `
                    <div class="card-escuderia ${podiumClass} flex items-center justify-between p-4 rounded-r-xl">
                        <div class="flex items-center gap-4">
                            <span class="font-f1 font-black italic text-2xl w-10 ${rankColor}">${index + 1}</span>
                            
                            <div class="relative w-16 h-16 flex items-center justify-center">
                                <img src="assets/${team.svgId}.svg" alt="Escudería" 
                                     class="escuderia-svg w-full h-full object-contain"
                                     onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${index}'">
                            </div>

                            <div>
                                <h2 class="font-f1 font-bold text-lg uppercase tracking-tight leading-none">${team.name}</h2>
                                <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Team Participant</span>
                            </div>
                        </div>

                        <div class="text-right">
                            <div class="text-3xl font-black font-f1 leading-none" style="color: ${index === 0 ? 'var(--f1-pink)' : 'white'}">
                                ${team.score}
                            </div>
                            <div class="text-[9px] font-bold text-zinc-500 tracking-[0.2em]">PUNTOS</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Ejecutar al cargar y cada 60 segundos
        updateLeaderboard();
        setInterval(updateLeaderboard, 60000);
    </script>
</body>
</html>
