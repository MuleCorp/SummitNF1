<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF1GO | Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --f1-pink: #be579b;
            --f1-blue: #0e4596;
            --f1-dark: #050505;
        }

        html { scroll-behavior: smooth; }
        body { background-color: var(--f1-dark); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }

        /* SECCIÓN 1: LEADERBOARD */
        #leaderboard-section {
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.95)), url('assets/fondoboard.jpeg');
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .card-escuderia {
            background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-left: 6px solid var(--f1-blue);
            transition: all 0.4s ease;
        }

        .top-1 { border-left-color: var(--f1-pink); background: rgba(190, 87, 155, 0.15); transform: scale(1.02); }

        /* SECCIÓN 2: PREMIACIÓN */
        #awards-section {
            background-image: linear-gradient(rgba(5, 5, 5, 0.65), rgba(5, 5, 5, 0.65)), url('assets/podio_estatuillas.png');
            background-size: cover; background-position: center bottom; background-repeat: no-repeat;
            height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: flex-end;
            position: relative; box-shadow: inset 0 100px 80px -50px var(--f1-dark);
        }

        /* Estilos del Podio (Sin recuadros, solo texto y SVGs) */
        .podium-display {
            @apply flex flex-col items-center justify-end font-black uppercase italic text-center;
            z-index: 10;
        }

        .podium-name {
            text-shadow: 0 0 15px #000, 0 0 30px #000;
            line-height: 1.1;
        }

        .podium-svg {
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));
            animation: float 4s ease-in-out infinite;
        }

        .statuette-icon {
            width: 50px; height: auto; margin-top: 10px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        /* Botón y Título Inferior */
        .btn-go-awards { background: var(--f1-pink); padding: 16px 32px; border-radius: 4px; box-shadow: 0 0 20px rgba(190, 87, 155, 0.3); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-row { animation: fadeInUp 0.5s ease forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <section id="leaderboard-section" class="min-h-screen py-12 px-4">
        <header class="text-center mb-12">
            <img src="assets/NF1GO.svg" alt="Logo" class="max-w-[280px] mx-auto">
            <div class="h-1 w-32 bg-[#be579b] mx-auto mt-6 rounded-full opacity-50"></div>
        </header>
        <div id="leaderboard-container" class="max-w-3xl mx-auto space-y-4 mb-20 text-center text-zinc-600 animate-pulse uppercase italic font-bold">
            Sincronizando telemetría...
        </div>
        <div class="text-center pb-12">
            <a href="#awards-section" class="btn-go-awards font-black italic uppercase tracking-widest text-sm text-white">Ir a Premiación ↓</a>
        </div>
    </section>

    <section id="awards-section">
        <div id="podium-names" class="w-full max-w-4xl mx-auto flex items-end justify-center gap-2 md:gap-4 pb-20 px-4">
            </div>

        <div class="w-full text-center pb-6">
            <h2 class="font-black italic text-lg md:text-xl tracking-[0.5em] text-white/30 uppercase">Parrilla de Ganadores</h2>
        </div>
    </section>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwwraDukAcjF87JOC550ef9BPkvodXFl3Nufj_SyzY7accOW78XB-fuo8ResMAHpnTF/exec';

        async function updateLeaderboard() {
            try {
                const response = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
                const data = await response.json();
                const teams = data.map(t => {
                    const v = Object.values(t);
                    return { name: v[0], score: parseInt(v[1]) || 0, svg: v[2] || "E01" };
                }).sort((a, b) => b.score - a.score);

                renderList(teams);
                renderPodium(teams);
            } catch (error) { console.error("Error:", error); }
        }

        function renderList(teams) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = teams.map((team, i) => `
                <div class="card-escuderia ${i === 0 ? 'top-1' : ''} flex items-center justify-between p-5 rounded-r-2xl animate-row" style="animation-delay: ${i*0.05}s">
                    <div class="flex items-center gap-6">
                        <span class="text-3xl font-black italic ${i === 0 ? 'text-[#be579b]' : 'text-zinc-700'} w-12">${i+1}</span>
                        <img src="assets/${team.svg}.svg" class="w-16 h-16 object-contain" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${i}'">
                        <h2 class="text-2xl md:text-3xl font-black uppercase italic tracking-tighter">${team.name}</h2>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-black ${i === 0 ? 'text-[#be579b]' : 'text-white'}">${team.score}</div>
                        <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Puntos</div>
                    </div>
                </div>
            `).join('');
        }

        function renderPodium(teams) {
            const container = document.getElementById('podium-names');
            const p = [teams[0] || {name: '---', svg: 'E01'}, teams[1] || {name: '---', svg: 'E01'}, teams[2] || {name: '---', svg: 'E01'}];

            // PLATA (Izq) - ORO (Centro) - BRONCE (Der)
            // Aumentamos los márgenes (mb) para que queden bien arriba alineados con la foto
            container.innerHTML = `
                <div class="podium-display w-1/3 mb-56">
                    <img src="assets/${p[1].svg}.svg" class="podium-svg w-28 h-28 mb-4">
                    <div class="podium-name text-white text-xl md:text-2xl font-bold">${p[1].name}</div>
                    <img src="assets/plata.png" class="statuette-icon">
                </div>

                <div class="podium-display w-1/3 mb-72">
                    <img src="assets/${p[0].svg}.svg" class="podium-svg w-36 h-36 mb-4">
                    <div class="podium-name text-[#be579b] text-3xl md:text-4xl font-black">${p[0].name}</div>
                    <img src="assets/oro.png" class="statuette-icon w-[60px]">
                </div>

                <div class="podium-display w-1/3 mb-48">
                    <img src="assets/${p[2].svg}.svg" class="podium-svg w-24 h-24 mb-4">
                    <div class="podium-name text-orange-200 text-lg md:text-xl font-bold">${p[2].name}</div>
                    <img src="assets/bronce.png" class="statuette-icon">
                </div>
            `;
        }

        updateLeaderboard();
        setInterval(updateLeaderboard, 10000);
    </script>
</body>
</html>
